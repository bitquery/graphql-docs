# Docusaurus static export (trailingSlash: false) emits routes as *.html files.
# Do NOT fall back to /index.html for every path — that breaks per-page <title> and
# canonical tags for crawlers that read the first HTML response.
server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    error_page 404 /404.html;
}
